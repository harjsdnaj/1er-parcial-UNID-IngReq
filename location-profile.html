<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <title>Locación — Portalverse</title>
</head>
<body>

  <div class="noise"></div>

  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-icon">●</span>
        <span class="logo-text">Portal<span class="logo-accent">verse</span></span>
      </a>
      <nav class="nav">
        <a href="/index.html" class="nav-link">Personajes</a>
        <a href="episodes.html" class="nav-link">Episodios</a>
        <a href="locations.html" class="nav-link active">Locaciones</a>
      </nav>
    </div>
  </header>

  <main>

    <div class="profile-back">
      <a href="/locations.html" class="back-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/>
        </svg>
        Volver a locaciones
      </a>
    </div>

    <section class="profile-section">
      <div class="profile-layout">

        <div class="profile-image-col">
          <div class="profile-portal-ring">
            <div class="portal-ring"></div>
            <div class="portal-ring portal-ring-2"></div>
          </div>
          <div class="profile-image-frame" style="display:flex;align-items:center;justify-content:center;background:var(--fallback-b1,oklch(var(--b1)));">
            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.4">
              <circle cx="12" cy="12" r="10"/>
              <ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(-20 12 12)"/>
              <line x1="2" y1="12" x2="22" y2="12"/>
            </svg>
          </div>
        </div>

        <div class="profile-info-col">
          <div class="profile-meta-top">
            <span class="profile-species">—</span>
          </div>
          <h1 class="profile-name">Earth (C-137)</h1>

          <div class="profile-details">
            <div class="profile-detail-item">
              <span class="detail-label">Tipo</span>
              <span class="detail-value">Planet</span>
            </div>
            <div class="profile-detail-item">
              <span class="detail-label">Dimensión</span>
              <span class="detail-value">Dimension C-137</span>
            </div>
            <div class="profile-detail-item">
              <span class="detail-label">Residentes</span>
              <span class="detail-value">—</span>
            </div>
          </div>

          <div class="profile-stats">
            <div class="profile-stat">
              <span class="profile-stat-num">27</span>
              <span class="profile-stat-label">Residentes</span>
            </div>
            <div class="profile-stat-sep"></div>
            <div class="profile-stat">
              <span class="profile-stat-num">Planet</span>
              <span class="profile-stat-label">Tipo</span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="episodes-section">
      <div class="episodes-header">
        <h2 class="episodes-title">Residentes conocidos</h2>
        <span class="episodes-count" id="residents-count">— residentes</span>
      </div>
      <div class="episodes-list">
      </div>
    </section>

  </main>

  <footer class="footer">
    <div class="footer-inner">
      <p class="footer-copy">&copy; 2025 Portalverse &mdash; Hecho con <span class="footer-heart">&#10022;</span> para exploradores del multiverso.</p>
      <div class="footer-links">
        <a href="#" class="footer-link">GitHub</a>
        <a href="#" class="footer-link">Documentación</a>
        <a href="#" class="footer-link">API</a>
      </div>
    </div>
  </footer>

  <script src="locations-profile.js"></script>
</body>
</html>
